<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学園祭スタンプラリー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">学園祭</p>
        <h1>Webスタンプラリー</h1>
      </div>
      <button id="resetButton" class="small-button" type="button">リセット</button>
    </header>

    <section id="messageBox" class="message info">
      QRコードを読み取ると、ここにスタンプが集まります。
    </section>

    <section class="progress-card">
      <div class="progress-text">
        <span id="countText">0 / 20</span>
        <span id="completeText">スタンプを集めよう</span>
      </div>
      <div class="progress-bar">
        <div id="progressBar" class="progress-fill"></div>
      </div>
    </section>

    <section id="stampBoard" class="stamp-board" aria-label="スタンプ台紙"></section>

    <section id="completeArea" class="complete-area hidden">
      <h2>🎉 コンプリート！ 🎉</h2>
      <p>景品交換所でこの画面を見せてください。</p>

      <div id="finishForm" class="finish-form">
        <label for="finishInput">景品を受け取ったら「済」と入力してください。</label>
        <div class="finish-row">
          <input id="finishInput" type="text" placeholder="済">
          <button id="finishButton" type="button">終了</button>
        </div>
      </div>
    </section>

    <section id="finishedArea" class="finished-area hidden">
      <h2>景品受け取り済み</h2>
      <p>ご参加ありがとうございました。</p>
    </section>

    <footer class="footer">
      <p>スマホのブラウザ内に記録します。ブラウザの履歴・保存データを消すと記録も消えます。</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
